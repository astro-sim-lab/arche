# EOS-MHD table generator config
# Priority: CLI > this file

# -----------------------------
# Beginner quickstart knobs
# -----------------------------
# HDF5 input (for build mode only)

EOS_INPUT_H5=results/quickstart/metal_grain/collapse_CR1e-17_Z1e-3.h5
EOS_OUTPUT=tools/eos_mhd_table_generator/results/CR1e-17_Z1e-3_compat.d
EOS_MODE=compat
EOS_ETA_MODEL=legacy
EOS_ETA_RESAMPLE=native
# Optional etaA compatibility tweak (default off)
EOS_ETAA_COMPAT_MODE=none
# Used only when EOS_ETAA_COMPAT_MODE=drop_c2_high_n
EOS_ETAA_DROP_C2_LOGN_MIN=19.0
EOS_WITH_HEADER=false

EOS_CHARGE_TABLE_PATH=tools/eos_mhd_table_generator/include/legacy_species_charge.dat
EOS_MASS_TABLE_PATH=tools/eos_mhd_table_generator/include/legacy_species_mass_amu.dat

# -----------------------------
# Advanced axis knobs
# -----------------------------
EOS_N_LOG_MIN=0.1
EOS_N_LOG_MAX=22.0
EOS_N_LOG_STEP=0.1

EOS_B_LOG_MIN=-20.0
EOS_B_LOG_MAX=4.0
EOS_B_LOG_STEP=0.2

