# default.conf
# Loaded automatically by run_collapse.sh unless --no-config is specified.
# Precedence: CLI options > environment variables > this file > built-in fallback.
#
# This file is organized as:
#   1) General operation keys (recommended for routine runs)
#   2) Wrapper path options
#   3) Advanced keys (expert-only knobs, grouped at the end)
#
# Override policy:
# - COMMON_* is allowed only when both PRIM_* and METAL_* can reference the key.
# - If a key is used by only one network, define only PRIM_* or METAL_* (no COMMON_*).
# - Per-network overrides are used only when that side needs an explicit deviation.

# ── General Operation Keys: Shared defaults (COMMON_*) ───────────────────────
# Per-network keys (PRIM_*/METAL_*) override these when both are present.
# Frequently tuned (scenario sweep)
COMMON_ZETA0=0
COMMON_FF_RET=1.0
# COMMON_FRET_TABLE=data/fret_table/fret_step_sample.dat
COMMON_JLW21=0.0
COMMON_REDSHIFT=0.0
# Allowed: solar, default, alpha-enhanced
COMMON_ABUNDANCE_SET=solar

# Initial-condition defaults (occasionally tuned)
COMMON_XNH0=0.1
COMMON_TK0=100.0
COMMON_YE0=1e-4
COMMON_YH2=6e-7
COMMON_YHD=4e-10

# Runtime control (typically fixed unless testing numerics)
COMMON_OUTPUT_STRIDE=100
COMMON_MAX_ITER=10000000
COMMON_DT_FACTOR=1e-3
COMMON_DT_FACTOR_INIT=1e-8
COMMON_N_INIT_STEPS=10
COMMON_XNH_STOP=1e23
COMMON_CR_ATTEN_COL_DENS=96.0

# Path (usually fixed)
# COMMON_DATA_DIR=data

# ── General Operation Keys: Primordial overrides (PRIM_*) ────────────────────
# Frequently tuned (primordial scenario)
# PRIM_ZETA0=1e-17
# PRIM_FF_RET=1.0
# PRIM_FRET_TABLE=data/fret_table/fret_step_sample.dat
# PRIM_JLW21=0.0
# PRIM_REDSHIFT=0.0
# PRIM_ABUNDANCE_SET=solar

# Initial-condition defaults (primordial)
# PRIM_XNH0=0.1
# PRIM_TK0=100.0
# PRIM_YE0=1e-4
# PRIM_YH2=6e-7
# PRIM_YHD=4e-10

# Runtime control (primordial)
# PRIM_OUTPUT_STRIDE=100
# PRIM_MAX_ITER=10000000
# PRIM_DT_FACTOR=1e-3
# PRIM_DT_FACTOR_INIT=1e-8
# PRIM_N_INIT_STEPS=10
# PRIM_XNH_STOP=1e23
# PRIM_CR_ATTEN_COL_DENS=96.0

# Path (primordial)
# PRIM_DATA_DIR=data/primordial

# ── General Operation Keys: Metal-grain overrides (METAL_*) ──────────────────
# NOTE:
# - METAL-only keys remain METAL_* only by policy (no COMMON_* for one-sided keys).
# Frequently tuned (metal-specific scenario)
METAL_Z_METAL=0
# METAL_ZETA0=1e-17
# METAL_FF_RET=1.0
# METAL_FRET_TABLE=data/fret_table/fret_step_sample.dat
# METAL_JLW21=0.0
# METAL_REDSHIFT=0.0
# METAL_ABUNDANCE_SET=solar

# Initial-condition / output defaults (metal-specific baseline)
METAL_XNH0=1.0
METAL_OUTPUT_STRIDE=10
METAL_MAX_ITER=1000000

# Initial-condition overrides (metal)
# METAL_TK0=100.0
# METAL_YE0=1e-4
# METAL_YH2=6e-7
# METAL_YHD=4e-10

# Runtime control overrides (metal)
# METAL_DT_FACTOR=1e-3
# METAL_DT_FACTOR_INIT=1e-8
# METAL_N_INIT_STEPS=10
# METAL_XNH_STOP=1e23
# METAL_CR_ATTEN_COL_DENS=96.0

# Path (metal)
# METAL_DATA_DIR=data/metal_grain

# ── Wrapper path options ──────────────────────────────────────────────────────
BUILD_DIR=build
OUT_DIR=results/
SAVE_DIR=results/

# ── Advanced Keys (Expert) ────────────────────────────────────────────────────
# Use these only when explicitly comparing model prescriptions.
# Keep these at file end by policy.

# Shared advanced keys:
# - Define COMMON_* only for knobs used by both primordial and metal networks.

# Primordial advanced overrides (optional)
# PRIM_CR_ATTEN_COL_DENS=96.0

